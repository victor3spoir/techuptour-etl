services:
  minio:
    image: minio/minio
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9001:9001"
    volumes:
      - minio-vol:/data
    networks:
      etl-net: