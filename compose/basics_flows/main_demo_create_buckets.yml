id: create_buckets
namespace: demo

variables:
  minio_access_key: minio
  minio_secret_key: minio_password
  minio_endpoint: http://minio:9000
  minio_region: "us-east-1"

tasks:
  - id: create_buckets
    type: io.kestra.plugin.core.flow.Parallel
    tasks:
      - id: create_bronze_bucket
        type: io.kestra.plugin.minio.CreateBucket
        endpoint: "{{vars.minio_endpoint}}"
        region:  "{{vars.minio_region}}"
        accessKeyId:  "{{vars.minio_access_key}}"
        secretKeyId:  "{{vars.minio_secret_key}}"
        bucket: "bronze"
        
      - id: create_silver_bucket
        type: io.kestra.plugin.minio.CreateBucket
        endpoint: "{{vars.minio_endpoint}}"
        region:  "{{vars.minio_region}}"
        accessKeyId:  "{{vars.minio_access_key}}"
        secretKeyId:  "{{vars.minio_secret_key}}"
        bucket: "silver"