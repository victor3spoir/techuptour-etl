datasources:
  postgres:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://kestra-db:5432/kestra
    username: $POSTGRES_USER
    password: $POSTGRES_PASSWORD

kestra:
  jdbc:
    queues:
    messageProtection:
      enabled: true
      limit: 1048576
  encryption:
    secret-key: 50ee98d2e259b314151c51663580aa62cebb8590ba98db336e9ccdb4c972502a

  server:
    basicAuth:
      enabled: true
      username: $KESTRA_AUTH_USERNAME
      password: $KESTRA_AUTH_PASSWORD
    liveness:
      enabled: true
      interval: 5s
      timeout: 45s
      initial-delay: 45s
      heartbeat-interval: 3s
  configurations:
    delete-files-on-start: true
  # url: https://kestra.localhost
  repository:
    type: postgres
  storage:
    type: minio
    minio:
      endpoint: http://kestra-minio
      port: 9000
      accessKey: $MINIO_ROOT_USER
      secretKey: $MINIO_ROOT_PASSWORD
      bucket: kestra
      region: us-east-1
  queue:
    type: postgres
  tasks:
    tmpDir:
      path: "/tmp/kestra-wd/tmp"
