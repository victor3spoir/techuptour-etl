id: connect_spark
namespace: demo

tasks:
  - id: process_data
    type: io.kestra.plugin.spark.PythonSubmit
    master: spark://spark:7077

    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: etl-net
      volumes:
        - /usr/app/scripts:/opt/kestra/scripts

    mainScript: /opt/kestra/scripts/main.py

    outputFiles:
      - output.json