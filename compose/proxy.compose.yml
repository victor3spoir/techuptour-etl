services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    privileged: true
    environment:
      CONTAINERS: 1  
      IMAGES: 1      
      NETWORKS: 1    
      VOLUMES: 1     
      AUTH: 1
      POST: 1
    expose:
      - 2375
    networks:
      - etl-net # Must be the same network Kestra is on
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock